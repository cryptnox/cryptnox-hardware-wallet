{%- if current_version %}
<div id="version-selector-container">
  <div class="version-dropdown">
    <button class="version-dropdown-btn" id="version-dropdown-btn" aria-haspopup="listbox" aria-expanded="false">
      <span>{{ current_version.name }}</span>
      <span class="version-caret">&#9660;</span>
    </button>
    <ul class="version-dropdown-list" id="version-dropdown-list" role="listbox">
      {% for item in versions.branches %}
      <li role="option" class="version-option{% if item.name == current_version.name %} selected{% endif %}" data-url="{{ item.url }}">{{ item.name }}</li>
      {% endfor %}
      {% for item in versions.tags %}
      <li role="option" class="version-option{% if item.name == current_version.name %} selected{% endif %}" data-url="{{ item.url }}">{{ item.name }}</li>
      {% endfor %}
    </ul>
  </div>
</div>
{%- endif %}
