{%- if current_version %}
<div id="version-selector-container">
  <select id="version-select">
    {% for item in versions.branches %}
    <option value="{{ item.url }}"{% if item.name == current_version.name %} selected{% endif %}>{{ item.name }}</option>
    {% endfor %}
    {% for item in versions.tags %}
    <option value="{{ item.url }}"{% if item.name == current_version.name %} selected{% endif %}>{{ item.name }}</option>
    {% endfor %}
  </select>
</div>
{%- endif %}
